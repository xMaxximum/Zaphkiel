name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > maxximum.keystore

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}

      - name: Get version info
        id: version
        run: |
          VERSION_CODE=$(grep -oP 'versionCode=\K[0-9]+' version.properties)
          APP_VERSION=$(grep -oP 'versionName=\K[0-9.]+' version.properties)
          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "APP_VERSION=${APP_VERSION}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/AlarmSetter.apk

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/AlarmSetter.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.APP_VERSION }}
          body: |
            **Release APK Build**
            
            Version: ${{ steps.version.outputs.APP_VERSION }}
            Version Code: ${{ steps.version.outputs.VERSION_CODE }}
            
            Built from commit: ${{ github.sha }}
            
            Download the APK below to install directly on your device.
          files: app/build/outputs/apk/release/AlarmSetter.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
